<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Payment — Visual Flow Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--bg:#f3f2f0;--s1:#f9f9f8;--s2:#eceae8;--s3:#e3e1de;--bd:#e3e1de;--tx:#2b2b2a;--dim:#76746f;--dim2:#9b9994;--accent:#2b2b2a;--grn:#6b8f5e;--red:#bf5940;--ylw:#b08c2a;--blu:#8b7e6a;--card-shadow:none}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:#2b2b2a20}

/* ─── NAV ─── */
nav{position:sticky;top:0;z-index:200;max-width:1200px;margin:0 auto;padding:12px 24px}
.nav-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px;background:rgba(249,249,248,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(227,225,222,.6);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.nav-top{display:flex;align-items:center;justify-self:start}
.logo{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.pills{display:flex;gap:0;justify-content:center;overflow-x:auto;scrollbar-width:none}.pills::-webkit-scrollbar{display:none}
.pill{padding:18px 14px;border:none;background:none;color:var(--dim);cursor:pointer;white-space:nowrap;font-size:13px;font-weight:600;transition:all .2s;border-bottom:2px solid transparent}
.pill:hover{color:var(--tx)}
.pill.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:800}

/* ─── SCENARIO BAR ─── */
.scn-bar{overflow-x:auto;scrollbar-width:none}
.scn-bar::-webkit-scrollbar{display:none}
.scn-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:center;padding:24px 24px 8px}
.scn-tabs{display:inline-flex;background:var(--s2);border-radius:12px;padding:3px;gap:2px;border:1px solid var(--bd)}
.scn-pill{padding:10px 24px;border-radius:10px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.scn-pill:hover{color:var(--tx)}
.scn-pill.on{background:var(--tx);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ─── MAIN ─── */
.main{max-width:1200px;margin:0 auto;padding:24px}

/* ─── PHONE ROW ─── */
.phone-section{display:flex;gap:110px;align-items:flex-start;justify-content:center;margin-bottom:20px;flex-wrap:nowrap;position:relative}
.phone-section::before{content:'';position:absolute;left:50%;top:40px;bottom:20px;border-left:1px dashed var(--bd);z-index:0}
.phone-col{display:flex;flex-direction:column;align-items:center;gap:14px}
.col-label{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.3px;padding:5px 16px;border-radius:8px;background:var(--s2);border:1px solid var(--bd)}

/* ═══ PHONE ═══ */
.phone{width:280px;height:560px;background:var(--phone-bg,#e8ebee);color:#1a1917;border-radius:36px;border:2px solid #c8ccd0;box-shadow:0 8px 28px rgba(30,30,40,.09),0 2px 6px rgba(30,30,40,.05),0 0 0 1px rgba(30,30,40,.04);overflow:hidden;display:flex;flex-direction:column;position:relative;transition:all .4s cubic-bezier(.4,0,.2,1)}
.phone .ph-body{transition:opacity .25s ease}
.phone::after{display:none}
.phone .thumb{display:none}
.ph-status{height:40px;padding:10px 18px 0;display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:#6b6965;flex-shrink:0}
.ph-bar{padding:4px 14px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ph-bar .back{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.75);box-shadow:0 1px 4px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:#5a5856}
.ph-bar .title{font-size:15px;font-weight:700;flex:1;color:#1a1917;letter-spacing:-.2px}
.ph-bar .badge{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.22)}
.ph-body{flex:1;padding:0 16px 12px;overflow:hidden}
.ph-bottom{padding:2px 12px 18px;flex-shrink:0}
.ph-btn{width:100%;padding:13px;border-radius:14px;border:none;font-size:13px;font-weight:700;color:#fff;cursor:pointer;text-align:center;transition:all .15s;box-shadow:0 3px 10px rgba(0,0,0,.18);letter-spacing:-.1px}
.ph-btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 5px 14px rgba(0,0,0,.22)}

/* Phone UI components */
.px{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
.px.dk{background:#2b2b2a;color:#f3f2f0}
.pr{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.pr+.pr{border-top:1px solid rgba(0,0,0,.05)}
.pr .l{font-size:10px;color:#9b9994;font-weight:500}.pr .v{font-size:12px;font-weight:700;color:#1a1917}
.pdiv{height:1px;background:rgba(0,0,0,.07);margin:5px 0}
.pamt{font-size:28px;font-weight:800;text-align:center;padding:10px 16px;letter-spacing:-1px;color:#1a1917}
.psub{font-size:10px;color:#9b9994;text-align:center;margin-top:2px}
.ptk{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1.5px solid #e3e1de;margin-bottom:6px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ptk.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,#fff);box-shadow:0 2px 8px color-mix(in srgb,var(--accent) 18%,transparent)}
.ptk .ico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.ptk .nm{font-size:12px;font-weight:600;color:#1a1917}.ptk .bl{font-size:9px;color:#9b9994;margin-top:1px}
.ptk .chk{width:17px;height:17px;border-radius:50%;border:2px solid #d5d2cc;margin-left:auto;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;flex-shrink:0}
.ptk.sel .chk{background:var(--accent);border-color:var(--accent);box-shadow:0 1px 4px color-mix(in srgb,var(--accent) 35%,transparent)}
.pqr{width:112px;height:112px;margin:8px auto 6px;border-radius:12px;background:#fff;display:grid;grid-template-columns:repeat(11,1fr);gap:1px;padding:6px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.pqc{border-radius:1px}
.pprog{display:flex;align-items:center;gap:10px;padding:11px 16px;background:#fff;border-radius:14px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:6px}
.pprog .ring{width:36px;height:36px;border-radius:50%;border:3px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.pprog .ring::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:3px solid transparent;border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pok{text-align:center;padding:14px 10px;background:#fff;border-radius:16px;box-shadow:0 1px 5px rgba(0,0,0,.08);margin-bottom:6px}
.pok .circle{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.pok h3{font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-.2px;color:#1a1917}
.pok p{font-size:10px;color:#9b9994}
.pwallet{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:12px;background:#fff;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.pwallet .wi{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:#f0eeeb;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pwallet .wn{font-size:11px;font-weight:600;color:#1a1917}.pwallet .wa{font-size:9px;color:#9b9994;font-family:monospace;letter-spacing:.3px}
.ptl{padding:4px 0}
.ptl-i{display:flex;gap:8px;padding:4px 0}
.ptl-d{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.ptl-t{font-size:11px;font-weight:600;color:#1a1917}.ptl-s{font-size:9px;color:#9b9994;margin-top:1px}
.pnote{font-size:10px;text-align:center;padding:7px 12px;border-radius:9px;margin-top:5px;line-height:1.5;font-weight:600;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.07);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mp-stat{text-align:center;padding:10px 8px;background:#fff;border-radius:14px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:6px}
.mp-big{font-size:24px;font-weight:800;letter-spacing:-1px}
.mp-sub{font-size:10px;color:#9b9994;margin-top:2px}
.mp-badge{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:.2px}
.mp-bar{height:4px;background:rgba(0,0,0,.07);border-radius:2px;overflow:hidden;margin:4px 0}
.mp-bar-fill{height:100%;border-radius:2px}
.mp-note{font-size:9px;padding:7px 10px;border-radius:9px;margin-top:5px;line-height:1.5;text-align:center;font-weight:500}

/* ─── TEXT TABS (sub-tabs, no frame) ─── */
.txt-tabs{display:flex;gap:24px;justify-content:center;padding:4px 0 16px}
.txt-pill{padding:5px 0;border:none;background:none;color:var(--dim2);font-size:13px;font-weight:600;cursor:pointer;transition:color .15s;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:-.1px}
.txt-pill:hover{color:var(--tx)}
.txt-pill.on{color:var(--tx);border-bottom-color:var(--tx)}

/* ─── CONTROLS ─── */
.controls{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:0;flex-wrap:wrap}
.ctrl-dots{display:flex;gap:5px;align-items:center}
.ctrl-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s;flex-shrink:0}
.ctrl-dot.on{background:#fff;width:18px;border-radius:4px}
.ctrl-label{font-size:11px;color:var(--dim);min-width:70px;text-align:center}
.ctrl-btn{padding:7px 20px;border-radius:8px;border:1px solid var(--bd);background:var(--s1);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.pri{background:var(--tx);color:#fff;border-color:var(--tx)}
.ctrl-btn.pri:hover{filter:brightness(1.1)}
.ctrl-btn:disabled{opacity:.3;cursor:default}

/* ─── STEP CONTEXT ─── */
.ctx-strip{width:80%;margin:16px auto 0;padding:18px 22px;background:#2b2b2a;border-radius:12px;color:#f3f2f0}
.ctx-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ctx-col{position:relative}
.ctx-cols .ctx-col:first-child::after{content:'';position:absolute;right:-7px;top:0;bottom:0;border-right:1px solid rgba(255,255,255,.12)}
.ctx-col .ctx-role{font-size:11px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.5);margin-bottom:4px}
.ctx-col .ctx-title{font-size:14px;font-weight:700;color:#f3f2f0;margin-bottom:4px}
.ctx-col .ctx-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6;min-height:4.8em}
.ctx-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;background:color-mix(in srgb,var(--accent) 10%,var(--s1));color:var(--accent)}

/* ─── PHONE NAV (arrows) ─── */
.phone-nav{display:flex;align-items:center;justify-content:space-between;min-width:560px}
.ph-arrow{width:40px;height:40px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;padding:0}
.ph-arrow:hover{opacity:.6}

/* ─── TOP WRAPPER (scn tabs + phones) ─── */
.top-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px 24px 36px;margin-bottom:24px;overflow-x:auto}
.top-wrap .scn-inner{padding:0 0 16px;justify-content:center;display:flex}

/* ─── INFO WRAPPER ─── */
.info-wrap{background:var(--s2);border-radius:16px;padding:24px;margin-top:36px}

/* ─── INFO SECTION (below phones) ─── */
.info-section{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:700px){.info-section{grid-template-columns:1fr}}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:24px}
.card h3{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--tx);display:flex;align-items:center;gap:4px;letter-spacing:.5px}.card h3::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--tx)}
.card.full{grid-column:1/-1}

/* Insight items */
.insight-item{padding:12px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;line-height:1.7;border:none;background:color-mix(in srgb,var(--s2) 50%,var(--s1))}
.insight-item.critical,.insight-item.good,.insight-item.warn,.insight-item.info{background:color-mix(in srgb,var(--s2) 50%,var(--s1))}
.insight-item strong{color:var(--tx)}
.insight-label{font-size:13px;font-weight:700;letter-spacing:.2px;margin-bottom:5px;word-break:keep-all;overflow-wrap:break-word;color:var(--tx)}

/* Quick stats */
.qstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.qs{padding:18px 8px;border-radius:8px;background:color-mix(in srgb,var(--s2) 50%,var(--s1));text-align:center}
.qs .qv{font-size:20px;font-weight:800;color:var(--accent)}.qs .ql{font-size:11px;color:var(--dim);margin-top:3px}

/* Docs items inline */
.doc-item{padding:14px 16px;background:color-mix(in srgb,var(--s2) 50%,var(--s1));border-radius:8px;margin-bottom:8px}
.doc-item h4{font-size:13px;font-weight:700;margin-bottom:4px}
.doc-item p{font-size:12px;color:var(--dim);line-height:1.6}
.doc-tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;margin-top:6px;background:color-mix(in srgb,var(--accent) 10%,var(--s2));color:var(--accent)}

/* Score bars */
.sbar{display:flex;align-items:center;gap:8px;padding:7px 0}
.sbar .sl{width:52px;font-size:12px;color:var(--dim);text-align:right;flex-shrink:0}
.sbar .sbg{flex:1;height:7px;background:var(--s3);border-radius:4px;overflow:hidden}
.sbar .sfg{height:100%;border-radius:4px;background:var(--accent)}
.sbar .sv{width:22px;font-size:13px;font-weight:700;text-align:right;color:var(--accent)}

/* ─── PAGE HEAD ─── */
.pg-head{display:grid;grid-template-columns:auto auto 1fr;align-items:center;gap:4px 12px;margin:8px 0 22px;padding:0 24px}
.pg-title{font-size:28px;font-weight:800;color:var(--tx);letter-spacing:-.5px;grid-column:1;grid-row:1}
.pg-flag{grid-column:2;grid-row:1;padding:7px 14px;border-radius:999px;background:color-mix(in srgb,var(--accent) 10%,var(--s1));color:var(--accent);font-size:12px;font-weight:700;border:1px solid color-mix(in srgb,var(--accent) 20%,transparent);white-space:nowrap;justify-self:start}
.pg-sub{font-size:15px;font-weight:500;color:var(--dim);grid-column:1/-1;grid-row:2}

/* ─── COMPARE ─── */
.compare{max-width:900px;margin:0 auto}
.compare h2{font-size:18px;font-weight:800;margin-bottom:4px}
.compare .csub{font-size:12px;color:var(--dim);margin-bottom:16px}
.ctbl{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}
.ctbl th{padding:10px 8px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);background:var(--s2);border-bottom:1px solid var(--bd)}
.ctbl td{padding:8px;border-bottom:1px solid var(--bd);background:var(--s1)}
.ctbl tr:hover td{background:var(--s2)}
.ck{color:var(--grn);font-weight:700}.cx{color:var(--red);font-weight:700}
.callout{padding:12px 14px;border-radius:10px;border-left:3px solid var(--accent);background:color-mix(in srgb,var(--accent) 5%,var(--s1));margin-bottom:12px;font-size:11px;color:var(--dim);line-height:1.7}
.callout strong{color:var(--tx)}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.sc-card{padding:12px;background:var(--s1);border:1px solid var(--bd);border-radius:10px}
.sc-card h4{font-size:11px;font-weight:700;margin-bottom:3px}
.sc-card p{font-size:10px;color:var(--dim);line-height:1.4}
.sc-card .stag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;margin-top:4px;background:color-mix(in srgb,var(--accent) 10%,var(--s1));color:var(--accent)}

@media(max-width:700px){.phone{width:240px;height:480px;border-radius:28px}.phone-section{gap:12px}}
</style>
</head>
<body>

<nav>
<div class="nav-inner">
  <div class="nav-top"><div class="logo"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="vertical-align:-3px;margin-right:6px"><rect width="20" height="20" rx="5" fill="#2b2b2a"/><path d="M6 10.5L9 13.5L14.5 7" stroke="#f3f2f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>CryptoPay Explorer</div></div>
  <div class="pills" id="pills"></div>
  <div></div>
</div>
</nav>
<div class="main" id="stage"></div>

<script>
const AC={base:'#5a6e8a',binance:'#b09540',coinbase:'#5a6e8a',stripe:'#7a6e8a',bitpay:'#5a6470'};
const PBG={base:'#e9ebec',binance:'#eceae6',coinbase:'#e9ebec',stripe:'#eae9ed',bitpay:'#e8eaeb'};
function qr(){return Array(121).fill(0).map(()=>`<div class="pqc" style="background:${Math.random()>.45?'#484746':'#eeede9'}"></div>`).join('')}

const SVCS={
base:{n:'Base Pay',c:AC.base,pos:'온체인 에스크로 결제 인프라',fee_summary:'1% + 가스비 ~$0.01',
  qs:[{v:'~1%',l:'수수료'},{v:'~2초',l:'정산'},{v:'비수탁형',l:'유형'},{v:'$0.01',l:'가스비'}],
  insights:[
    {type:'critical',label:'핵심 포지션',text:'업계 유일 온체인 에스크로 (Auth-Capture). 전통 결제의 승인→캡처→환불→취소를 스마트 컨트랙트로 재현한 유일한 서비스.'},
    {type:'warn',label:'최대 약점',text:'법정화폐 직접 정산 미지원. 머천트 대시보드 자체가 없음 — 비수탁형이라 자금이 지갑에 직접 도착. x402도 GUI 없이 서버 API/로그로만 모니터링.'},
    {type:'good',label:'AI 에이전트',text:'x402: HTTP 402 기반 AI 결제. 1.19억+ TX, 연간화 $600M, USDC 98.7%. Foundation: Google, AWS, Visa, Anthropic.'},
    {type:'info',label:'수익 구조',text:'5레이어: L0 USDC Rev Share $332.5M/분기 | L1 시퀀서 $75.4M/년(L2 62%) | L2 x402 | L3 Commerce 1% | L4 Business'}
  ],
  docs:[
    {h:'즉시 결제 (1세대 Transfers.sol)',p:'9가지 함수. Uniswap V3 자동 스왑. Base/ETH/Polygon 3개 체인.',tg:'1세대'},
    {h:'에스크로 (2세대 AuthCaptureEscrow)',p:'Authorize→Capture→Void→Refund→Reclaim. Minimal Proxy 패턴. Base 전용.',tg:'2세대'},

function getScreens(){const d=SCN[cur];if(!d||!d[curScn])return[];const t=d[curScn];return Array.isArray(t)?t:(t[curSubScn]||t[Object.keys(t)[0]]);}
function selSubScn(k){clearAuto();curSubScn=k;curStep=0;render();renderScnBar();}

function renderNav(){
  const el=document.getElementById('pills');
  const all=[...Object.entries(SVCS).map(([k,s])=>({id:k,...s}))];
  el.innerHTML=all.map(s=>`<div class="pill ${s.id===cur?'on':''}" onclick="sel('${s.id}')">${s.n}</div>`).join('');
}

function renderScnBar(){
  const el=document.getElementById('scnBar');
  if(cur==='compare'){
    el.innerHTML=`<div class="scn-tabs">${['scorecard','payment','settlement','refund'].map(k=>`<div class="scn-pill ${k===curScn?'on':''}" onclick="selScn('${k}')">${{scorecard:'스코어카드',payment:'결제',settlement:'정산',refund:'환불'}[k]}</div>`).join('')}</div>`;
    return;
  }
  const scnData=SCN[cur];if(!scnData)return;
  el.innerHTML=`<div class="scn-tabs">${Object.keys(scnData).map(k=>`<div class="scn-pill ${k===curScn?'on':''}" onclick="selScn('${k}')">${{payment:'결제',settlement:'정산',refund:'환불'}[k]||k}</div>`).join('')}</div>`;
}

function renderCompare(stage){

  let h='<div class="compare">';
  if(curScn==='scorecard'){
    h+=`<h2>경쟁력 스코어카드</h2><div class="csub">72페이지 리서치 기반 10점 만점</div>`;
    h+=`<div class="card" style="margin-bottom:12px"><div style="overflow-x:auto"><table class="ctbl"><thead><tr><th>항목</th>${svcs.map(([k,s])=>`<th style="color:${s.c}">${s.n}</th>`).join('')}</tr></thead><tbody>`;
    for(const[ck,cl]of Object.entries(labels)){h+=`<tr><td style="font-weight:600">${cl}</td>${svcs.map(([k,s])=>`<td><div style="display:flex;align-items:center;gap:4px"><div style="flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden"><div style="height:100%;width:${s.scores[ck]*10}%;background:${s.c};border-radius:2px"></div></div><span style="font-weight:700;color:${s.c};font-size:10px">${s.scores[ck]}</span></div></td>`).join('')}</tr>`;}
    h+=`<tr style="font-weight:800"><td>종합</td>${svcs.map(([k,s])=>`<td style="color:${s.c};font-size:14px">${s.scores.total.toFixed(1)}</td>`).join('')}</tr></tbody></table></div></div>`;
    h+=`<div class="callout"><strong>5대 핵심 발견:</strong> 1)법정화폐 자동정산=Stripe+BitPay만 2)독립수익=BitPay만 3)환불/보호 업계 미해결 4)Stripe 수직통합=구조적 위협 5)AI 에이전트=차세대 성장</div>`;
  } else if(curScn==='scenario'){
    h+=`<h2>최적 시나리오 추천</h2><div class="csub">유스케이스별 적합 서비스</div>`;
    const recs=[['실물 이커머스','에스크로 Auth-Capture','Base / Coinbase'],['디지털 상품','1%+$0.01 최저','Base Pay'],['법정화폐 자동정산','암호화폐 차폐 USD','Stripe'],['글로벌 법정화폐','38개국 직접','BitPay'],['Binance 사용자','P2P 무료 즉시','Binance Pay'],['AI 에이전트','x402/MPP','Base / Stripe'],['SaaS 구독','스마트컨트랙트(유일)','Stripe'],['신흥국','가스비0 은행불필요','Binance Pay']];
    h+=`<div class="sc-grid">${recs.map(([t,r,s])=>`<div class="sc-card"><h4>${t}</h4><p>${r}</p><span class="stag">${s}</span></div>`).join('')}</div>`;
  } else {
    const tables={payment:[['즉시 결제',[1,1,1,1,1]],['Auth-Capture',[1,0,1,0,0]],['AI 에이전트',[1,0,0,1,0]],['구독',[0,0,0,1,0]],['QR',[0,1,0,0,1]],['오픈소스',[1,0,1,0,'△']],['Shopify',[1,0,1,1,'앱']]],settlement:[['속도',['~2초','<10ms','~200ms','0.4~12초','~1h']],['법정화폐',['✗간접','✗불가','△USD','✓자동','✓38국']],['수수료',['~1%','1%','1%','1.5%','1-2%']],['크립토노출',['있음','있음','있음','없음','선택']]],refund:[['대시보드환불',['✗','✓','✗수동','✓','✓']],['수수료환불',['✗','✓유일','✗','✗','✗']],['Void',['✓','✗','✓','✗','✗']],['UX',['중','중','하','상','중하']]]};
    const data=tables[curScn];if(data){
      h+=`<h2>${{payment:'결제',settlement:'정산',refund:'환불'}[curScn]} 비교</h2><div class="csub">5개 서비스 교차 비교</div>`;
      h+=`<div class="card"><div style="overflow-x:auto"><table class="ctbl"><thead><tr><th></th>${svcs.map(([k,s])=>`<th style="color:${s.c}">${s.n}</th>`).join('')}</tr></thead><tbody>`;
      for(const[f,vals]of data){h+=`<tr><td style="font-weight:600">${f}</td>${vals.map(v=>typeof v==='number'?`<td class="${v?'ck':'cx'}">${v?'✓':'✗'}</td>`:`<td>${v}</td>`).join('')}</tr>`;}
      h+=`</tbody></table></div></div>`;
    }
  }
  h+='</div>';stage.innerHTML=h;
}

function sel(id){clearAuto();cur=id;curStep=0;if(id==='compare'){if(!['scorecard','payment','settlement','refund'].includes(curScn))curScn='scorecard';}else{const d=SCN[id];if(d){curScn=Object.keys(d)[0];const t=d[curScn];if(t&&!Array.isArray(t))curSubScn=Object.keys(t)[0];}}renderNav();render();renderScnBar();}
function selScn(k){clearAuto();curScn=k;curStep=0;const d=SCN[cur];if(d&&d[k]&&!Array.isArray(d[k]))curSubScn=Object.keys(d[k])[0];render();renderScnBar();}
function next(){clearAuto();const screens=getScreens();if(curStep<screens.length-1){curStep++;render();renderScnBar();}}
function prev(){clearAuto();if(curStep>0){curStep--;render();renderScnBar();}}
function goStep(i){clearAuto();curStep=i;render();renderScnBar();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}else if(e.key==='ArrowLeft'){e.preventDefault();prev();}});
renderNav();render();renderScnBar();
</script>
</body>
</html>
